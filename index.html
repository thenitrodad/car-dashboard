<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Dashboard</title>
  </head>
  <body style="margin:0; background:#02040a; color:white; font-family:sans-serif;">
    <div id="app" style="padding:20px;">
      <h1>🚗 Car Dashboard</h1>
      <p>Tap a button:</p>

      <button onclick="openMaps()" style="padding:20px; margin:10px; font-size:18px;">
        🗺 Maps
      </button>

      <button onclick="openMusic()" style="padding:20px; margin:10px; font-size:18px;">
        🎵 Music
      </button>

      <button onclick="openWeather()" style="padding:20px; margin:10px; font-size:18px;">
        ☀️ Weather
      </button>
    </div>

    <script>
      function openMaps() {
        window.location.href = "https://maps.apple.com/";
      }

      function openMusic() {
        window.location.href = "https://pandora.com";
      }

      function openWeather() {
        window.location.href = "https://weather.com";
      }
    </script>
  </body>
</html>
